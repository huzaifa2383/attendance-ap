<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrasa Attendance Pro Max</title>

<style>
body { 
  font-family: Arial, sans-serif; 
  text-align:center; 
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height: 100vh;
  padding: 10px;
}
.box { 
  background:white; 
  padding:20px; 
  margin:20px auto; 
  max-width:420px; 
  border-radius:12px; 
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
}
button { 
  padding:12px 20px; 
  margin:5px; 
  border:none; 
  border-radius:6px; 
  cursor:pointer; 
  font-weight: bold;
}
.green{background:#2ecc71;color:white;}
.blue{background:#3498db;color:white;}
.dark{background:#34495e;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#e67e22;color:white;}

input,select{
  width:90%;
  padding:12px;
  margin:8px;
  border-radius:6px;
  border: 2px solid #ddd;
}

table{width:100%;margin-top:15px;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:8px;font-size:12px;}
th{background:#34495e;color:white;}

.success{background:#d4edda;color:#155724;padding:10px;}
.error{background:#f8d7da;color:#721c24;padding:10px;}
</style>
</head>

<body>

<div class="box">
<h2>📍 Madrasa Attendance</h2>

<select id="name"></select>
<input type="password" id="pin" placeholder="Enter PIN">

<button class="green" onclick="checkIn()">Check In</button>
<button class="blue" onclick="checkOut()">Check Out</button>

<p id="status"></p>
</div>

<div class="box">
<h3>🔐 Admin Panel</h3>
<input type="password" id="adminPin" placeholder="Admin PIN">

<button class="dark" onclick="loadData()">View</button>
<button class="dark" onclick="monthlySummary()">Summary</button>
<button class="dark" onclick="downloadCSV()">CSV</button>

<button class="orange" onclick="addHoliday()">Add Holiday</button>
<button class="orange" onclick="viewHolidays()">View Holidays</button>

<table id="table"></table>

<div id="holidayDiv"></div>

<h3>📊 Monthly Summary</h3>
<table id="summary"></table>
</div>

<script>

// 🔐 SETTINGS
const ADMIN_PIN = btoa("1234"); // encoded
const LAT = 18.51278;
const LNG = 73.87936;
const RADIUS = 200;

// 👥 NAMES
const names=[
"Shk Huzaifa bhai",
"Shk Khuzaima bhai",
"Shk Taha bhai",
"Mulla Mohammad bhai",
"Farida ben",
"Arwa ben",
"Rashida ben",
"UmmeSalama ben"
];

// 🔑 PINS
const pins={
"Shk Huzaifa bhai":"1111",
"Shk Khuzaima bhai":"2222",
"Shk Taha bhai":"3333",
"Mulla Mohammad bhai":"4444",
"Farida ben":"5555",
"Arwa ben":"6666",
"Rashida ben":"7777",
"UmmeSalama ben":"8888"
};

// populate dropdown
names.forEach(n=>{
 let o=document.createElement("option");
 o.text=n;
 document.getElementById("name").add(o);
});

// safe parse
function safeParse(v){
 try{return JSON.parse(v);}catch{return null;}
}

// key
function key(name,date){
 date=date||new Date();
 return name+"_"+date.toDateString();
}

// distance
function dist(a,b,c,d){
 let R=6371e3;
 let φ1=a*Math.PI/180,φ2=c*Math.PI/180;
 let Δφ=(c-a)*Math.PI/180;
 let Δλ=(d-b)*Math.PI/180;
 let x=Math.sin(Δφ/2)**2+
 Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// status message
function show(msg,type){
 let s=document.getElementById("status");
 s.innerText=msg;
 s.className=type;
 setTimeout(()=>{s.innerText="";s.className="";},4000);
}

// holiday
function isHoliday(){
 let t=new Date().toDateString();
 let h=safeParse(localStorage.getItem("holidays"))||[];
 return h.includes(t);
}

// admin check
function verifyAdmin(){
 if(btoa(document.getElementById("adminPin").value)!==ADMIN_PIN){
  alert("Wrong Admin PIN"); return false;
 }
 return true;
}

// SELECT NAME
function nameSelect(){
 return document.getElementById("name").value;
}

// CHECK IN
function checkIn(){
 let name=nameSelect();
 let pin=document.getElementById("pin").value;

 if(pins[name]!==pin){show("Wrong PIN","error");return;}
 if(isHoliday()){show("Holiday","error");return;}

 navigator.geolocation.getCurrentPosition(pos=>{

 if(pos.coords.accuracy>100){
  show("Weak GPS","error");return;
 }

 let d=dist(pos.coords.latitude,pos.coords.longitude,LAT,LNG);
 if(d>RADIUS){show("Outside "+Math.round(d)+"m","error");return;}

 let k=key(name);
 if(localStorage.getItem(k)){show("Already checked in","error");return;}

 let now=new Date();
 let start=new Date();start.setHours(16,0,0);
 let late=new Date();late.setHours(16,50,0);

 let status="";
 if(now<start){show("Too early","error");return;}
 else if(now<=late){status="On Time";}
 else{status="Late";}

 localStorage.setItem(k,JSON.stringify({
  name,
  date:now.toDateString(),
  in:now.toLocaleTimeString(),
  out:"",
  status
 }));

 show("Checked In ("+status+")","success");
 });
}

// CHECK OUT
function checkOut(){
 let name=nameSelect();
 let pin=document.getElementById("pin").value;

 if(pins[name]!==pin){show("Wrong PIN","error");return;}

 let k=key(name);
 let data=safeParse(localStorage.getItem(k));

 if(!data){show("No check-in","error");return;}

 let now=new Date();
 let cutoff=new Date();cutoff.setHours(22,0,0);

 if(now>cutoff){show("Attendance closed","error");return;}

 if(data.out){show("Already checked out","error");return;}

 data.out=now.toLocaleTimeString();
 localStorage.setItem(k,JSON.stringify(data));

 show("Checked Out","success");
}

// LOAD DATA
function loadData(){
 if(!verifyAdmin())return;

 let html="<tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th></tr>";

 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;

   html+=`<tr>
   <td>${d.name}</td>
   <td>${d.date}</td>
   <td>${d.in}</td>
   <td>${d.out||"-"}</td>
   <td>${d.status}</td>
   </tr>`;
  }
 }

 document.getElementById("table").innerHTML=html;
}

// SUMMARY
function monthlySummary(){
 if(!verifyAdmin())return;

 let map={};
 names.forEach(n=>map[n]={t:0,l:0,o:0,a:0});

 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;

   map[d.name].t++;
   if(d.status==="Late")map[d.name].l++;
   else if(d.status==="Absent")map[d.name].a++;
   else map[d.name].o++;
  }
 }

 let html="<tr><th>Name</th><th>Total</th><th>On Time</th><th>Late</th><th>Absent</th><th>%</th></tr>";

 for(let n in map){
  let present=map[n].o+map[n].l;
  let percent=map[n].t?((present/map[n].t)*100).toFixed(1):0;

  html+=`<tr>
  <td>${n}</td>
  <td>${map[n].t}</td>
  <td>${map[n].o}</td>
  <td>${map[n].l}</td>
  <td>${map[n].a}</td>
  <td>${percent}%</td>
  </tr>`;
 }

 document.getElementById("summary").innerHTML=html;
}

// CSV
function downloadCSV(){
 let csv="Name,Date,In,Out,Status\n";

 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;

   csv+=`${d.name},${d.date},${d.in},${d.out},${d.status}\n`;
  }
 }

 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv]));
 a.download="attendance.csv";
 a.click();
}

// ADD HOLIDAY
function addHoliday(){
 if(!verifyAdmin())return;

 let date=prompt("Enter date DD/MM/YYYY");
 if(!date)return;

 let p=date.split("/");
 let d=new Date(p[2],p[1]-1,p[0]).toDateString();

 let h=safeParse(localStorage.getItem("holidays"))||[];
 h.push(d);
 localStorage.setItem("holidays",JSON.stringify(h));

 alert("Holiday added");
}

// VIEW HOLIDAY
function viewHolidays(){
 let h=safeParse(localStorage.getItem("holidays"))||[];

 let html="<h4>Holidays</h4>";
 h.forEach(d=>{
  html+=`<p>${d}</p>`;
 });

 document.getElementById("holidayDiv").innerHTML=html;
}

// AUTO ABSENT
function autoAbsent(){
 let now=new Date();
 let cutoff=new Date();
 cutoff.setHours(22,0,0);

 if(now<cutoff)return;

 names.forEach(n=>{
  let k=key(n);
  if(!localStorage.getItem(k)){
   localStorage.setItem(k,JSON.stringify({
    name:n,
    date:now.toDateString(),
    in:"-",
    out:"-",
    status:"Absent"
   }));
  }
 });
}

window.onload=function(){
 autoAbsent();
};

</script>

</body>
</html>
