<!DOCTYPE html>

<html>
<head>
  <title>Madrasa Smart Attendance</title>

  <!-- Leaflet Map -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; text-align:center; }
    input, select, button { padding:10px; margin:5px; }
    table { border-collapse: collapse; width:90%; margin:auto; }
    th, td { border:1px solid #ccc; padding:8px; }
    #map { height:300px; margin:10px; }
  </style>

</head>

<body>

<h2>📍 Madrasa Smart Attendance</h2>

<select id="teacher"></select><br> <input type="password" id="pin" placeholder="Enter PIN"><br>

<button onclick="checkIn()">Check In</button> <button onclick="checkOut()">Check Out</button>

<p id="status"></p>

<div id="map"></div>

<hr>

<h3>🔒 Admin Panel</h3>
<input type="password" id="adminPin" placeholder="Admin PIN"><br>

<button onclick="loadData()">Load</button> <button onclick="downloadCSV()">CSV</button> <button onclick="monthlySummary()">Summary</button> <button onclick="addHoliday()">Add Holiday</button>

<table id="table"></table>

<h3>📊 Monthly Summary</h3>
<table id="summary"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARZZMs4J24iFjLgmLzqqIz2PnwWmosmGg",
  authDomain: "madrasa-attendance-47e69.firebaseapp.com",
  projectId: "madrasa-attendance-47e69",
  storageBucket: "madrasa-attendance-47e69.firebasestorage.app",
  messagingSenderId: "390959800510",
  appId: "1:390959800510:web:19a1133e41b55b0ed1beef",
  measurementId: "G-EK7LF2NLVE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔐 SETTINGS
const ADMIN_PIN = "1234";

const USER_PINS = {
  "Shk Huzaifa bhai":"1111",
  "Shk Khuzaima bhai":"2222",
  "Shk Taha bhai":"3333",
  "Mulla Mohammad bhai":"4444",
  "Farida ben":"5555",
  "Arwa ben":"6666",
  "Rashida ben":"7777",
  "UmmeSalama ben":"8888"
};

// 📍 LOCATION
const SCHOOL_LAT = 18.51278;
const SCHOOL_LNG = 73.87936;
const RADIUS = 200;

// fill dropdown
for(let u in USERS){
  teacher.innerHTML += `<option>${u}</option>`;
}

// 🗺 MAP
let map = L.map('map').setView([SCHOOL_LAT, SCHOOL_LNG], 16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// madrasa marker
const schoolMarker = L.marker([SCHOOL_LAT, SCHOOL_LNG])
.addTo(map).bindPopup("🏫 Madrasa");

// radius circle
L.circle([SCHOOL_LAT, SCHOOL_LNG], {
  radius: RADIUS,
  color: 'green'
}).addTo(map);

let userMarker;

let distance = 999;

// 📍 LIVE LOCATION
navigator.geolocation.watchPosition(pos => {

  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const accuracy = pos.coords.accuracy;

  distance = calc(lat,lng,SCHOOL_LAT,SCHOOL_LNG);

  if(userMarker) map.removeLayer(userMarker);

  userMarker = L.marker([lat,lng])
    .addTo(map)
    .bindPopup("📍 You");

  status.innerHTML =
    `Distance: ${Math.round(distance)}m | Accuracy: ${Math.round(accuracy)}m<br>` +
    (distance <= RADIUS ? "✅ Inside Area" : "❌ Outside Area");

});

// 📏 DISTANCE
function calc(a,b,c,d){
  const R=6371e3;
  const φ1=a*Math.PI/180, φ2=c*Math.PI/180;
  const Δφ=(c-a)*Math.PI/180;
  const Δλ=(d-b)*Math.PI/180;

  const x=Math.sin(Δφ/2)**2 +
    Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ⏰ TIME
function allowedTime(){
  const h=new Date().getHours();
  return h>=16 && h<=22;
}

// 📅 HOLIDAY
async function isHoliday(){
  const today=new Date().toDateString();
  const snap=await getDocs(collection(db,"holidays"));

  for(const d of snap.docs){
    if(d.data().date===today) return true;
  }
  return false;
}

// ✅ CHECK IN
window.checkIn = async ()=>{

  if(await isHoliday()){
    alert("Holiday"); return;
  }

  if(distance>RADIUS){
    alert("Outside area"); return;
  }

  if(!allowedTime()){
    alert("Allowed only 4PM–10PM"); return;
  }

  const name=teacher.value;
  const pinVal=pin.value;

  if(USERS[name]!==pinVal){
    alert("Wrong PIN"); return;
  }

  const today=new Date().toDateString();

  const q=query(collection(db,"attendance"),
    where("name","==",name),
    where("date","==",today)
  );

  const snap=await getDocs(q);

  for(const d of snap.docs){
    if(!d.data().checkOut){
      alert("Already checked in"); return;
    }
  }

  const now=new Date();
  const cutoff=new Date();
  cutoff.setHours(16,50,0);

  const stat = now>cutoff ? "Late" : "On Time";

  await addDoc(collection(db,"attendance"),{
    name,
    date:today,
    checkIn:now.toLocaleTimeString(),
    checkOut:"",
    status:stat,
    dist:Math.round(distance)
  });

  alert("Checked In");
};

// ✅ CHECK OUT
window.checkOut = async ()=>{

  const name=teacher.value;
  const today=new Date().toDateString();

  const q=query(collection(db,"attendance"),
    where("name","==",name),
    where("date","==",today)
  );

  const snap=await getDocs(q);

  if(snap.empty){
    alert("No check-in found"); return;
  }

  for(const d of snap.docs){
    if(!d.data().checkOut){
      await updateDoc(doc(db,"attendance",d.id),{
        checkOut:new Date().toLocaleTimeString()
      });
      alert("Checked Out");
      return;
    }
  }

  alert("Already checked out");
};

// 📊 LOAD
window.loadData = async ()=>{

  if(adminPin.value!==ADMIN_PIN){
    alert("Wrong PIN"); return;
  }

  const snap=await getDocs(collection(db,"attendance"));

  let html="<tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Dist</th><th>Del</th></tr>";

  snap.forEach(d=>{
    const x=d.data();
    html+=`<tr>
      <td>${x.name}</td>
      <td>${x.date}</td>
      <td>${x.checkIn}</td>
      <td>${x.checkOut||"-"}</td>
      <td>${x.status}</td>
      <td>${x.dist}m</td>
      <td><button onclick="del('${d.id}')">X</button></td>
    </tr>`;
  });

  table.innerHTML=html;
};

// 🗑 DELETE
window.del = async (id)=>{
  await deleteDoc(doc(db,"attendance",id));
  loadData();
};

// 📥 CSV
window.downloadCSV = async ()=>{
  const snap=await getDocs(collection(db,"attendance"));

  let csv="Name,Date,In,Out,Status,Distance\n";

  snap.forEach(d=>{
    const x=d.data();
    csv+=`${x.name},${x.date},${x.checkIn},${x.checkOut},${x.status},${x.dist}\n`;
  });

  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv]));
  a.download="attendance.csv";
  a.click();
};

// 📊 SUMMARY
window.monthlySummary = async ()=>{
  const snap=await getDocs(collection(db,"attendance"));

  let map={};

  snap.forEach(d=>{
    const x=d.data();
    if(!map[x.name]) map[x.name]={t:0,l:0};
    map[x.name].t++;
    if(x.status==="Late") map[x.name].l++;
  });

  let html="<tr><th>Name</th><th>Total</th><th>Late</th></tr>";

  for(let n in map){
    html+=`<tr><td>${n}</td><td>${map[n].t}</td><td>${map[n].l}</td></tr>`;
  }

  summary.innerHTML=html;
};

// 📅 HOLIDAY
window.addHoliday = async ()=>{
  const date = prompt("Enter date exactly (example: Wed Apr 30 2026)");
  if(!date) return;

  await addDoc(collection(db,"holidays"),{date});
  alert("Holiday added");
};

</script>

</body>
</html>
