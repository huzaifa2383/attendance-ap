<!DOCTYPE html>
<html>
<head>
  <title>Madrasa Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    button { margin: 5px; padding: 10px; }
    table { margin: auto; border-collapse: collapse; }
    td, th { padding: 8px; border: 1px solid #ccc; }
  </style>
</head>

<body>

<h2>Madrasa Attendance</h2>

<select id="teacher">
<option>Select Name</option>
<option>Shk Huzaifa bhai</option>
<option>Shk Khuzaima bhai</option>
<option>Shk Taha bhai</option>
<option>Mulla Mohammad bhai</option>
<option>Farida ben</option>
<option>Arwa ben</option>
<option>Rashida ben</option>
<option>UmmeSalama ben</option>
</select>

<br><br>

<input type="password" id="pin" placeholder="Enter PIN">

<br><br>

<button onclick="markAttendance()">Check In</button>
<button onclick="markLeave()">Check Out</button>

<p id="status"></p>

<hr>

<h3>🔐 Admin Panel</h3>

<input type="password" id="adminPin" placeholder="Admin PIN">

<br><br>

<button onclick="loadAttendance()">Load Attendance</button>
<button onclick="monthlySummary()">Monthly Summary</button>
<button onclick="addHoliday()">Add Holiday</button>

<div id="holidays"></div>
<br>
<div id="data"></div>
<br>
<div id="summary"></div>

<script>

// 🔥 YOUR FIREBASE CONFIG (PUT YOUR OWN)
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 📍 LOCATION
const SCHOOL_LAT = 18.512606;
const SCHOOL_LNG = 73.879298;
const ALLOWED_RADIUS = 50;

// 🔐 ADMIN PIN
const ADMIN_PIN = "1234";

// 👤 USER PINS
const pins = {
  "Shk Huzaifa bhai": "1111",
  "Shk Khuzaima bhai": "2222",
  "Shk Taha bhai": "3333",
  "Mulla Mohammad bhai": "4444",
  "Farida ben": "5555",
  "Arwa ben": "6666",
  "Rashida ben": "7777",
  "UmmeSalama ben": "8888"
};

// 📏 DISTANCE CALCULATION
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

// 📅 CHECK HOLIDAY
async function isHoliday(date) {
  const snap = await db.collection("holidays").where("date","==",date).get();
  return !snap.empty;
}

// ✅ CHECK IN
async function markAttendance() {

  const name = document.getElementById("teacher").value;
  const pin = document.getElementById("pin").value;

  if (!pins[name] || pins[name] !== pin) {
    alert("Wrong PIN");
    return;
  }

  const today = new Date().toISOString().split("T")[0];

  if (await isHoliday(today)) {
    alert("Holiday — attendance blocked");
    return;
  }

  const existing = await db.collection("attendance")
    .where("name","==",name)
    .where("date","==",today)
    .get();

  if (!existing.empty) {
    alert("Already checked in today");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {

    const dist = getDistance(
      pos.coords.latitude,
      pos.coords.longitude,
      SCHOOL_LAT,
      SCHOOL_LNG
    );

    if (dist > ALLOWED_RADIUS) {
      document.getElementById("status").innerHTML =
        "❌ Outside (" + Math.round(dist) + "m)";
      return;
    }

    const now = new Date();

    const late =
      now.getHours() > 16 ||
      (now.getHours() === 16 && now.getMinutes() > 50);

    db.collection("attendance").add({
      name,
      date: today,
      checkIn: now.toLocaleTimeString(),
      checkOut: "",
      status: late ? "Late" : "On Time",
      distance: Math.round(dist)
    });

    document.getElementById("status").innerHTML =
      "✅ Checked In (" + Math.round(dist) + "m)";
  });
}

// 🚪 CHECK OUT
async function markLeave() {

  const name = document.getElementById("teacher").value;
  const today = new Date().toISOString().split("T")[0];

  const snap = await db.collection("attendance")
    .where("name","==",name)
    .where("date","==",today)
    .get();

  snap.forEach(doc => {
    db.collection("attendance").doc(doc.id).update({
      checkOut: new Date().toLocaleTimeString()
    });
  });

  alert("Checked Out");
}

// 📋 LOAD ATTENDANCE
function loadAttendance() {

  if (document.getElementById("adminPin").value !== ADMIN_PIN) {
    alert("Wrong admin PIN");
    return;
  }

  let html = "<table><tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Dist</th></tr>";

  db.collection("attendance").get().then(snap => {

    snap.forEach(doc => {
      const d = doc.data();

      html += `<tr>
        <td>${d.name}</td>
        <td>${d.date}</td>
        <td>${d.checkIn}</td>
        <td>${d.checkOut || "-"}</td>
        <td>${d.status || "-"}</td>
        <td>${d.distance || "-"}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("data").innerHTML = html;
  });

  loadHolidays();
}

// 📅 ADD HOLIDAY
function addHoliday() {
  const date = prompt("Enter date YYYY-MM-DD");
  const name = prompt("Holiday name");

  if (!date) return;

  db.collection("holidays").add({ date, name });
}

// 📅 LOAD HOLIDAYS
function loadHolidays() {

  let html = "<h4>📅 Holidays</h4>";

  db.collection("holidays").get().then(snap => {

    snap.forEach(doc => {
      const h = doc.data();

      html += `<p>${h.date} - ${h.name}
      <button onclick="deleteHoliday('${doc.id}')">❌</button></p>`;
    });

    document.getElementById("holidays").innerHTML = html;
  });
}

// ❌ DELETE HOLIDAY
function deleteHoliday(id) {
  db.collection("holidays").doc(id).delete();
  loadHolidays();
}

// 📊 SUMMARY
function monthlySummary() {

  let summary = {};

  db.collection("attendance").get().then(snap => {

    snap.forEach(doc => {
      const d = doc.data();

      if (!summary[d.name]) {
        summary[d.name] = { total: 0, late: 0 };
      }

      summary[d.name].total++;

      if (d.status === "Late") {
        summary[d.name].late++;
      }
    });

    let html = "<h3>📊 Monthly Summary</h3>";
    html += "<table><tr><th>Name</th><th>Total Days</th><th>Late Days</th></tr>";

    for (let name in summary) {
      html += `<tr>
        <td>${name}</td>
        <td>${summary[name].total}</td>
        <td>${summary[name].late}</td>
      </tr>`;
    }

    html += "</table>";

    document.getElementById("summary").innerHTML = html;
  });
}

</script>

</body>
</html>
