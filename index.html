<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Madrasa Smart Attendance + Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root { --primary: #2c3e50; --success: #27ae60; --info: #2980b9; --bg: #f0f2f5; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    
    h2, h3 { color: var(--primary); margin-top: 0; }
    select, input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    
    .btn-group { display: flex; gap: 10px; }
    button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.3s; margin-bottom: 5px; }
    
    .btn-in { background: var(--success); color: white; }
    .btn-out { background: var(--info); color: white; }
    .btn-admin { background: var(--primary); color: white; width: 100%; }
    button:hover { opacity: 0.8; }

    #status { font-weight: bold; padding: 10px; border-radius: 5px; margin: 10px 0; }
    .scroll-table { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
    th { background: #f8f9fa; }

    #map { height: 350px; width: 100%; margin-top: 20px; border-radius: 12px; border: 2px solid #ddd; display: none; }
    hr { margin: 25px 0; border: 0; border-top: 1px solid #eee; }
  </style>
</head>

<body>

<div class="container">
  <h2>📍 Madrasa Smart Attendance</h2>
  
  <select id="name">
    <option value="">Select Your Name</option>
    <option>Shk Huzaifa bhai</option>
    <option>Shk Huzaima bhai</option>
    <option>Shk Taha bhai</option>
    <option>Mulla Mohammad bhai</option>
    <option>Farida ben</option>
    <option>Arwa ben</option>
    <option>Rashida ben</option>
    <option>UmmeSalama ben</option>
  </select>

  <input type="password" id="pin" placeholder="Enter Personal PIN">

  <div class="btn-group">
    <button class="btn-in" onclick="checkIn()">Check In</button>
    <button class="btn-out" onclick="checkOut()">Check Out</button>
  </div>

  <p id="status"></p>

  <hr>

  <h3>🔐 Admin Panel</h3>
  <input type="password" id="adminPin" placeholder="Enter Admin PIN">
  
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
    <button class="btn-admin" onclick="loadData()">View Attendance</button>
    <button class="btn-admin" onclick="showMap()">Show Map View</button>
    <button class="btn-admin" onclick="downloadCSV()">CSV Export</button>
    <button class="btn-admin" onclick="addHoliday()">Add Holiday</button>
  </div>

  <div id="map"></div>

  <div class="scroll-table">
    <table id="table"></table>
  </div>

  <div class="scroll-table">
    <table id="holidayTable"></table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, updateDoc, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// --- CONFIGURATION ---
const firebaseConfig = {
  apiKey: "AIzaSyARZZMs4J24iFjLgmLzqqIz2PnwWmosmGg",
  authDomain: "madrasa-attendance-47e69.firebaseapp.com",
  projectId: "madrasa-attendance-47e69",
  storageBucket: "madrasa-attendance-47e69.firebasestorage.app",
  messagingSenderId: "390959800510",
  appId: "1:390959800510:web:19a1133e41b55b0ed1beef",
  measurementId: "G-EK7LF2NLVE"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SCHOOL_LAT = 18.51278; 
const SCHOOL_LNG = 73.87936;
const RADIUS = 80; 
const ADMIN_PIN = "9999";

const pins = {
  "Shk Huzaifa bhai": "1111", "Shk Huzaima bhai": "2222", "Shk Taha bhai": "3333",
  "Mulla Mohammad bhai": "4444", "Farida ben": "5555", "Arwa ben": "6666",
  "Rashida ben": "7777", "UmmeSalama ben": "8888"
};

let map;

// --- UTILITIES ---
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)) * 1000;
}

const today = () => new Date().toDateString();

// --- MAIN FUNCTIONS ---
window.checkIn = async function() {
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;
  const statusEl = document.getElementById("status");

  if (!name || pins[name] !== pin) { alert("Wrong Name or PIN"); return; }

  statusEl.innerHTML = "⌛ Verifying location...";

  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const dist = getDistance(lat, lng, SCHOOL_LAT, SCHOOL_LNG);

    if (dist > RADIUS) {
      statusEl.style.color = "red";
      statusEl.innerHTML = `❌ Outside Boundary (${Math.round(dist)}m)`;
      return;
    }

    const q = query(collection(db, "attendance"), where("name","==",name), where("date","==",today()));
    const snap = await getDocs(q);
    if (!snap.empty) { alert("Already checked in today"); return; }

    const now = new Date();
    const lateTime = new Date(); lateTime.setHours(16,50,0);
    const status = now > lateTime ? "Late" : "On Time";

    await addDoc(collection(db, "attendance"), {
      name, date: today(), in: now.toLocaleTimeString(), out: "", 
      status, dist: Math.round(dist), lat, lng, timestamp: Date.now()
    });

    statusEl.style.color = "green";
    statusEl.innerHTML = `✅ Checked In at ${now.toLocaleTimeString()}`;
  }, () => {
    alert("Please enable GPS/Location Access");
  });
}

window.checkOut = async function() {
  const name = document.getElementById("name").value;
  const q = query(collection(db, "attendance"), where("name","==",name), where("date","==",today()));
  const snap = await getDocs(q);

  if (snap.empty) { alert("No check-in found for today"); return; }
  const d = snap.docs[0];
  if (d.data().out) { alert("Already checked out"); return; }

  await updateDoc(doc(db, "attendance", d.id), { out: new Date().toLocaleTimeString() });
  alert("Checked Out successfully");
}

window.loadData = async function() {
  if (document.getElementById("adminPin").value !== ADMIN_PIN) { alert("Unauthorized"); return; }
  const snap = await getDocs(query(collection(db, "attendance"), orderBy("timestamp", "desc")));
  let html = "<tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Del</th></tr>";
  snap.forEach(d => {
    const x = d.data();
    html += `<tr><td>${x.name}</td><td>${x.date}</td><td>${x.in}</td><td>${x.out || "-"}</td><td>${x.status}</td>
    <td><button onclick="del('${d.id}')">❌</button></td></tr>`;
  });
  document.getElementById("table").innerHTML = html;
}

window.showMap = async function() {
  if (document.getElementById("adminPin").value !== ADMIN_PIN) { alert("Unauthorized"); return; }
  const mapDiv = document.getElementById("map");
  mapDiv.style.display = "block";

  if (!map) {
    map = L.map('map').setView([SCHOOL_LAT, SCHOOL_LNG], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.circle([SCHOOL_LAT, SCHOOL_LNG], { color: 'green', radius: RADIUS }).addTo(map).bindPopup("Madrasa");
  }

  const snap = await getDocs(query(collection(db, "attendance"), where("date", "==", today())));
  snap.forEach(d => {
    const x = d.data();
    if(x.lat) L.marker([x.lat, x.lng]).addTo(map).bindPopup(`${x.name} (${x.in})`);
  });
}

window.del = async (id) => { if(confirm("Delete this record?")) { await deleteDoc(doc(db,"attendance",id)); loadData(); } };

window.downloadCSV = async function() {
  const snap = await getDocs(collection(db,"attendance"));
  let csv = "Name,Date,In,Out,Status\n";
  snap.forEach(d => { const x = d.data(); csv += `${x.name},${x.date},${x.in},${x.out},${x.status}\n`; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "attendance.csv"; a.click();
};

window.addHoliday = async function() {
  const date = prompt("Enter Holiday (e.g. 15 Aug 2024)");
  if (date) { await addDoc(collection(db,"holidays"),{date}); loadHolidays(); }
};

window.loadHolidays = async function() {
  const snap = await getDocs(collection(db,"holidays"));
  let html = "<tr><th>Holiday Date</th></tr>";
  snap.forEach(d => { html += `<tr><td>${d.data().date}</td></tr>`; });
  document.getElementById("holidayTable").innerHTML = html;
};

</script>
</body>
</html>
