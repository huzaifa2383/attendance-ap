<!DOCTYPE html>
<html>
<head>
  <title>Madrasa Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    select, input {
      width: 90%;
      padding: 10px;
      margin: 8px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    table {
      margin: auto;
      border-collapse: collapse;
      width: 95%;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ccc;
    }

    .late { color: red; font-weight: bold; }
    .ontime { color: green; font-weight: bold; }
  </style>
</head>

<body>

<div class="card">
<h2>Madrasa Attendance</h2>

<select id="teacher">
<option>Select Name</option>
<option>Shk Huzaifa bhai</option>
<option>Shk Khuzaima bhai</option>
<option>Shk Taha bhai</option>
<option>Mulla Mohammad bhai</option>
<option>Farida ben</option>
<option>Arwa ben</option>
<option>Rashida ben</option>
<option>UmmeSalama ben</option>
</select>

<input type="password" id="pin" placeholder="Enter PIN">

<button onclick="markAttendance()">Check In</button>
<button onclick="markLeave()">Check Out</button>

<p id="status"></p>
</div>

<div class="card">
<h3>🔐 Admin Panel</h3>

<input type="password" id="adminPin" placeholder="Admin PIN">

<br>

<button onclick="loadAttendance()">Load</button>
<button onclick="monthlySummary()">Summary</button>
<button onclick="downloadCSV()">Download Excel</button>
<button onclick="addHoliday()">Add Holiday</button>

<div id="holidays"></div>
<div id="data"></div>
<div id="summary"></div>
</div>

<script>

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const SCHOOL_LAT = 18.512606;
const SCHOOL_LNG = 73.879298;
const ALLOWED_RADIUS = 50;

const ADMIN_PIN = "1234";

const pins = {
  "Shk Huzaifa bhai": "1111",
  "Shk Khuzaima bhai": "2222",
  "Shk Taha bhai": "3333",
  "Mulla Mohammad bhai": "4444",
  "Farida ben": "5555",
  "Arwa ben": "6666",
  "Rashida ben": "7777",
  "UmmeSalama ben": "8888"
};

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)**2 +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

async function isHoliday(date) {
  const snap = await db.collection("holidays").where("date","==",date).get();
  return !snap.empty;
}

async function markAttendance() {

  const name = document.getElementById("teacher").value;
  const pin = document.getElementById("pin").value;

  if (!pins[name] || pins[name] !== pin) {
    alert("Wrong PIN");
    return;
  }

  const today = new Date().toISOString().split("T")[0];

  if (await isHoliday(today)) {
    alert("Holiday");
    return;
  }

  const existing = await db.collection("attendance")
    .where("name","==",name)
    .where("date","==",today)
    .get();

  if (!existing.empty) {
    alert("Already marked");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {

    const dist = getDistance(
      pos.coords.latitude,
      pos.coords.longitude,
      SCHOOL_LAT,
      SCHOOL_LNG
    );

    if (dist > ALLOWED_RADIUS) {
      document.getElementById("status").innerHTML = "❌ Outside (" + Math.round(dist) + "m)";
      return;
    }

    const now = new Date();
    const late = now.getHours() > 16 || (now.getHours()==16 && now.getMinutes()>50);

    db.collection("attendance").add({
      name,
      date: today,
      checkIn: now.toLocaleTimeString(),
      checkOut: "",
      status: late ? "Late" : "On Time"
    });

    document.getElementById("status").innerHTML = "✅ Checked In";
  });
}

async function markLeave() {
  const name = document.getElementById("teacher").value;
  const today = new Date().toISOString().split("T")[0];

  const snap = await db.collection("attendance")
    .where("name","==",name)
    .where("date","==",today)
    .get();

  snap.forEach(doc => {
    db.collection("attendance").doc(doc.id).update({
      checkOut: new Date().toLocaleTimeString()
    });
  });

  alert("Checked Out");
}

function loadAttendance() {

  if (document.getElementById("adminPin").value !== ADMIN_PIN) {
    alert("Wrong admin PIN");
    return;
  }

  let html = "<table><tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th></tr>";

  db.collection("attendance").get().then(snap => {

    snap.forEach(doc => {
      const d = doc.data();

      const cls = d.status === "Late" ? "late" : "ontime";

      html += `<tr>
        <td>${d.name}</td>
        <td>${d.date}</td>
        <td>${d.checkIn}</td>
        <td>${d.checkOut || "-"}</td>
        <td class="${cls}">${d.status}</td>
      </tr>`;
    });

    html += "</table>";
    document.getElementById("data").innerHTML = html;
  });

  loadHolidays();
}

function monthlySummary() {

  let summary = {};

  db.collection("attendance").get().then(snap => {

    snap.forEach(doc => {
      const d = doc.data();

      if (!summary[d.name]) {
        summary[d.name] = { total: 0, late: 0 };
      }

      summary[d.name].total++;

      if (d.status === "Late") summary[d.name].late++;
    });

    let html = "<h3>📊 Summary</h3><table><tr><th>Name</th><th>Total</th><th>Late</th></tr>";

    for (let name in summary) {
      html += `<tr><td>${name}</td><td>${summary[name].total}</td><td>${summary[name].late}</td></tr>`;
    }

    html += "</table>";
    document.getElementById("summary").innerHTML = html;
  });
}

function addHoliday() {
  const date = prompt("YYYY-MM-DD");
  const name = prompt("Name");
  if (!date) return;
  db.collection("holidays").add({ date, name });
}

function loadHolidays() {
  let html = "<h4>📅 Holidays</h4>";

  db.collection("holidays").get().then(snap => {
    snap.forEach(doc => {
      const h = doc.data();
      html += `<p>${h.date} - ${h.name}</p>`;
    });

    document.getElementById("holidays").innerHTML = html;
  });
}

// 📥 CSV DOWNLOAD
function downloadCSV() {

  db.collection("attendance").get().then(snap => {

    let csv = "Name,Date,CheckIn,CheckOut,Status\n";

    snap.forEach(doc => {
      const d = doc.data();
      csv += `${d.name},${d.date},${d.checkIn},${d.checkOut || ""},${d.status}\n`;
    });

    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "attendance.csv";
    a.click();
  });
}

</script>

</body>
</html>
