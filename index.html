<!DOCTYPE html>
<html>
<head>
  <title>Madrasa Smart Attendance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial; text-align:center;">

<h2>📍 Madrasa Smart Attendance</h2>

<select id="name">
  <option value="">Select Name</option>
  <option>Shk Huzaifa bhai</option>
  <option>Shk Huzaima bhai</option>
  <option>Shk Taha bhai</option>
  <option>Mulla Mohammad bhai</option>
  <option>Farida ben</option>
  <option>Arwa ben</option>
  <option>Rashida ben</option>
  <option>UmmeSalama ben</option>
</select>

<br><br>

<input type="password" id="pin" placeholder="Enter PIN">

<br><br>

<button onclick="checkIn()">Check In</button>
<button onclick="checkOut()">Check Out</button>

<p id="status"></p>

<hr>

<h3>🔐 Admin Panel</h3>

<input type="password" id="adminPin" placeholder="Admin PIN">
<br><br>

<button onclick="loadData()">Load Attendance</button>
<button onclick="downloadCSV()">Download CSV</button>

<table border="1" id="table" style="margin:auto; margin-top:20px;"></table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs,
  query, where, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARZZMs4J24iFjLgmLzqqIz2PnwWmosmGg",
  authDomain: "madrasa-attendance-47e69.firebaseapp.com",
  projectId: "madrasa-attendance-47e69",
  storageBucket: "madrasa-attendance-47e69.firebasestorage.app",
  messagingSenderId: "390959800510",
  appId: "1:390959800510:web:19a1133e41b55b0ed1beef",
  measurementId: "G-EK7LF2NLVE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const SCHOOL_LAT = 18.51278;
const SCHOOL_LNG = 73.87936;
const RADIUS = 200;

const pins = {
  "Shk Huzaifa bhai": "1111",
  "Shk Huzaima bhai": "2222",
  "Shk Taha bhai": "3333",
  "Mulla Mohammad bhai": "4444",
  "Farida ben": "5555",
  "Arwa ben": "6666",
  "Rashida ben": "7777",
  "UmmeSalama ben": "8888"
};

const ADMIN_PIN = "9999";

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))) * 1000;
}

function getToday() {
  return new Date().toDateString();
}

async function checkIn() {
  const name = document.getElementById("name").value;
  const pin = document.getElementById("pin").value;

  if (!name || pins[name] !== pin) {
    alert("Wrong PIN");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const dist = getDistance(pos.coords.latitude, pos.coords.longitude, SCHOOL_LAT, SCHOOL_LNG);

    if (dist > RADIUS) {
      document.getElementById("status").innerHTML = "❌ Outside (" + Math.round(dist) + "m)";
      return;
    }

    const today = getToday();

    const q = query(collection(db, "attendance"),
      where("name", "==", name),
      where("date", "==", today)
    );

    const snap = await getDocs(q);

    if (!snap.empty) {
      alert("Already checked in today");
      return;
    }

    const now = new Date();
    const time = now.toLocaleTimeString();

    const lateTime = new Date();
    lateTime.setHours(16,50,0);

    const status = now > lateTime ? "Late" : "On Time";

    await addDoc(collection(db, "attendance"), {
      name,
      date: today,
      in: time,
      out: "",
      status,
      dist: Math.round(dist)
    });

    document.getElementById("status").innerHTML = "✅ Checked In at " + time;
  });
}

async function checkOut() {
  const name = document.getElementById("name").value;

  const today = getToday();

  const q = query(collection(db, "attendance"),
    where("name", "==", name),
    where("date", "==", today)
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    alert("No check-in found");
    return;
  }

  const docRef = snap.docs[0];

  if (docRef.data().out) {
    alert("Already checked out");
    return;
  }

  const time = new Date().toLocaleTimeString();

  await updateDoc(doc(db, "attendance", docRef.id), {
    out: time
  });

  alert("Checked Out");
}

async function loadData() {
  if (document.getElementById("adminPin").value !== ADMIN_PIN) {
    alert("Wrong admin PIN");
    return;
  }

  const snap = await getDocs(collection(db, "attendance"));

  let html = "<tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Dist</th><th>Delete</th></tr>";

  snap.forEach(d => {
    const data = d.data();

    html += `
    <tr>
      <td>${data.name}</td>
      <td>${data.date}</td>
      <td>${data.in}</td>
      <td>${data.out || "-"}</td>
      <td>${data.status}</td>
      <td>${data.dist}m</td>
      <td><button onclick="del('${d.id}')">Delete</button></td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

window.del = async function(id) {
  await deleteDoc(doc(db, "attendance", id));
  loadData();
};

window.downloadCSV = async function() {
  const snap = await getDocs(collection(db, "attendance"));
  let csv = "Name,Date,In,Out,Status,Distance\n";

  snap.forEach(d => {
    const x = d.data();
    csv += `${x.name},${x.date},${x.in},${x.out},${x.status},${x.dist}\n`;
  });

  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "attendance.csv";
  a.click();
};

</script>

</body>
</html>
