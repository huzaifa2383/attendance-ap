<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrasa Attendance Pro</title>

<style>
body{font-family:Arial;text-align:center;background:linear-gradient(135deg,#667eea,#764ba2);}
.box{background:white;padding:20px;margin:20px auto;max-width:420px;border-radius:12px;}
button{padding:10px;margin:5px;border:none;border-radius:6px;cursor:pointer;}
.green{background:#2ecc71;color:white;}
.blue{background:#3498db;color:white;}
.dark{background:#34495e;color:white;}
.red{background:#e74c3c;color:white;}
.orange{background:#e67e22;color:white;}

input,select{width:90%;padding:10px;margin:6px;border-radius:6px;}

table{width:100%;margin-top:10px;border-collapse:collapse;}
td,th{border:1px solid #ddd;padding:6px;font-size:12px;}

.success{background:#d4edda;color:#155724;padding:8px;}
.error{background:#f8d7da;color:#721c24;padding:8px;}

.btn-small{padding:4px 8px;font-size:10px;margin:2px;}
.holiday-item{background:#f8f9fa;padding:6px;margin:4px;border-radius:5px;display:flex;justify-content:space-between;}
</style>
</head>

<body>

<div class="box">
<h2>📍 Madrasa Attendance</h2>

<select id="name"></select>
<input type="password" id="pin" placeholder="Enter PIN">

<button class="green" onclick="checkIn()">Check In</button>
<button class="blue" onclick="checkOut()">Check Out</button>

<p id="status"></p>
</div>

<div class="box">
<h3>🔐 Admin</h3>
<input type="password" id="adminPin" placeholder="Admin PIN">

<button class="dark" onclick="loadData()">View</button>
<button class="dark" onclick="monthlySummary()">Summary</button>
<button class="dark" onclick="downloadCSV()">CSV</button>

<button class="orange" onclick="addHoliday()">Add Holiday</button>
<button class="orange" onclick="viewHolidays()">View Holidays</button>

<button class="dark" onclick="markAbsent()">Mark Absent</button>

<table id="table"></table>
<div id="holidayDiv"></div>

<h3>📊 Summary</h3>
<table id="summary"></table>
</div>

<script>

const ADMIN_PIN=btoa("4217");
const LAT=18.51278;
const LNG=73.87936;
const RADIUS=100;

const names=[
"Shk Huzaifa bhai",
"Shk Khuzaima bhai",
"Shk Taha bhai",
"Mulla Mohammad bhai",
"Farida ben",
"Arwa ben",
"Rashida ben",
"UmmeSalama ben"
];

const pins={
"Shk Huzaifa bhai":"1111",
"Shk Khuzaima bhai":"2222",
"Shk Taha bhai":"3333",
"Mulla Mohammad bhai":"4444",
"Farida ben":"5555",
"Arwa ben":"6666",
"Rashida ben":"7777",
"UmmeSalama ben":"8888"
};

names.forEach(n=>{
 let o=document.createElement("option");
 o.text=n;
 document.getElementById("name").add(o);
});

function safeParse(v){try{return JSON.parse(v);}catch{return null;}}
function key(name,date){date=date||new Date();return name+"_"+date.toDateString();}
function dist(a,b,c,d){
 let R=6371e3,φ1=a*Math.PI/180,φ2=c*Math.PI/180;
 let Δφ=(c-a)*Math.PI/180,Δλ=(d-b)*Math.PI/180;
 let x=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
 return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function show(msg,type){
 let s=document.getElementById("status");
 s.innerText=msg;s.className=type;
 setTimeout(()=>{s.innerText="";s.className="";},4000);
}
function nameSelect(){return document.getElementById("name").value;}
function verifyAdmin(){
 if(btoa(document.getElementById("adminPin").value)!==ADMIN_PIN){
  alert("Wrong Admin PIN");return false;
 }
 return true;
}
function isHoliday(){
 let t=new Date().toDateString();
 let h=safeParse(localStorage.getItem("holidays"))||[];
 return h.includes(t);
}

// CHECK IN
function checkIn(){
 let name=nameSelect();
 let pin=document.getElementById("pin").value;

 if(pins[name]!==pin){show("Wrong PIN","error");return;}
 if(isHoliday()){show("Holiday","error");return;}

 navigator.geolocation.getCurrentPosition(pos=>{

 if(pos.coords.accuracy>100){show("Weak GPS","error");return;}

 let d=dist(pos.coords.latitude,pos.coords.longitude,LAT,LNG);
 if(d>RADIUS){show("Outside "+Math.round(d)+"m","error");return;}

 let k=key(name);
 if(localStorage.getItem(k)){show("Already checked in","error");return;}

 let now=new Date();
 let start=new Date();start.setHours(16,0,0);
 let late=new Date();late.setHours(16,50,0);

 let status= now<start ? "Early" : (now<=late?"On Time":"Late");

 localStorage.setItem(k,JSON.stringify({
  name,date:now.toDateString(),in:now.toLocaleTimeString(),out:"",status
 }));

 show("Checked In ("+status+")","success");
 });
}

// CHECK OUT
function checkOut(){
 let name=nameSelect();
 let pin=document.getElementById("pin").value;

 if(pins[name]!==pin){show("Wrong PIN","error");return;}

 let k=key(name);
 let data=safeParse(localStorage.getItem(k));
 if(!data){show("No check-in","error");return;}

 if(data.out){show("Already checked out","error");return;}

 data.out=new Date().toLocaleTimeString();
 localStorage.setItem(k,JSON.stringify(data));

 show("Checked Out","success");
}

// LOAD DATA
function loadData(){
 if(!verifyAdmin())return;

 let html="<tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Actions</th></tr>";

 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;

   html+=`<tr>
   <td>${d.name}</td>
   <td>${d.date}</td>
   <td>${d.in}</td>
   <td>${d.out||"-"}</td>
   <td>${d.status}</td>
   <td>
     <button class="btn-small dark" onclick="editRecord('${k}')">Edit</button>
     <button class="btn-small red" onclick="delRecord('${k}')">Delete</button>
   </td>
   </tr>`;
  }
 }

 document.getElementById("table").innerHTML=html;
}

// DELETE
function delRecord(k){
 if(confirm("Delete record?")){
  localStorage.removeItem(k);
  loadData();
 }
}

// EDIT
function editRecord(k){
 let d=safeParse(localStorage.getItem(k));
 if(!d) return;

 let newIn=prompt("Edit Check-In",d.in);
 let newOut=prompt("Edit Check-Out",d.out);
 let newStatus=prompt("Edit Status (Early/On Time/Late/Absent)",d.status);

 d.in=newIn||d.in;
 d.out=newOut||d.out;
 d.status=newStatus||d.status;

 localStorage.setItem(k,JSON.stringify(d));
 loadData();
}

// HOLIDAY
function addHoliday(){
 if(!verifyAdmin())return;
 let date=prompt("DD/MM/YYYY");
 if(!date)return;

 let p=date.split("/");
 let d=new Date(p[2],p[1]-1,p[0]).toDateString();

 let h=safeParse(localStorage.getItem("holidays"))||[];
 h.push(d);
 localStorage.setItem("holidays",JSON.stringify(h));

 alert("Holiday added");
}

function viewHolidays(){
 if(!verifyAdmin())return;

 let h=safeParse(localStorage.getItem("holidays"))||[];

 let html="<h3>Holidays</h3>";
 h.forEach((d,i)=>{
  html+=`<div class="holiday-item">
   ${d}
   <button onclick="delHoliday(${i})">X</button>
  </div>`;
 });

 document.getElementById("holidayDiv").innerHTML=html;
}

function delHoliday(i){
 let h=safeParse(localStorage.getItem("holidays"))||[];
 h.splice(i,1);
 localStorage.setItem("holidays",JSON.stringify(h));
 viewHolidays();
}

// MARK ABSENT
function markAbsent(){
 if(!verifyAdmin())return;

 let name=prompt("Enter exact name");
 if(!name)return;

 let k=key(name);
 if(localStorage.getItem(k)){alert("Already exists");return;}

 localStorage.setItem(k,JSON.stringify({
  name,date:new Date().toDateString(),
  in:"-",out:"-",status:"Absent"
 }));

 alert("Marked absent");
}

// SUMMARY
function monthlySummary(){
 if(!verifyAdmin())return;

 let map={};
 names.forEach(n=>map[n]={t:0,l:0,o:0,a:0});

 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;

   map[d.name].t++;
   if(d.status==="Late")map[d.name].l++;
   else if(d.status==="Absent")map[d.name].a++;
   else map[d.name].o++;
  }
 }

 let html="<tr><th>Name</th><th>Total</th><th>OnTime</th><th>Late</th><th>Absent</th><th>%</th></tr>";

 for(let n in map){
  let p=map[n].o+map[n].l;
  let percent=map[n].t?((p/map[n].t)*100).toFixed(1):0;

  html+=`<tr>
   <td>${n}</td>
   <td>${map[n].t}</td>
   <td>${map[n].o}</td>
   <td>${map[n].l}</td>
   <td>${map[n].a}</td>
   <td>${percent}%</td>
  </tr>`;
 }

 document.getElementById("summary").innerHTML=html;
}

// CSV
function downloadCSV(){
 let csv="Name,Date,In,Out,Status\n";
 for(let k in localStorage){
  if(k.includes("_") && k!=="holidays"){
   let d=safeParse(localStorage.getItem(k));
   if(!d) continue;
   csv+=`${d.name},${d.date},${d.in},${d.out},${d.status}\n`;
  }
 }
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([csv]));
 a.download="attendance.csv";
 a.click();
}

</script>

</body>
</html>
