<!DOCTYPE html>
<html>
<head>
  <title>Madrasa Attendance</title>
  <style>
    body { font-family: Arial; text-align: center; }
    select, input, button { padding: 10px; margin: 8px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; }
  </style>
</head>

<body>

<h2>Madrasa Attendance</h2>

<select id="teacher">
  <option>Select Name</option>
  <option>Shk Huzaifa bhai</option>
  <option>Shk Khuzaima bhai</option>
  <option>Shk Taha bhai</option>
  <option>Mulla Mohammad bhai</option>
  <option>Farida ben</option>
  <option>Arwa ben</option>
  <option>Rashida ben</option>
  <option>UmmeSalama ben</option>
</select>

<br>

<input type="password" id="pin" placeholder="Enter PIN">

<br>

<button onclick="checkIn()">Check In</button>
<button onclick="checkOut()">Check Out</button>

<p id="status"></p>

<hr>

<h3>🔒 Admin Panel</h3>

<input type="password" id="adminPin" placeholder="Admin PIN">

<br>

<button onclick="loadAttendance()">Load Attendance</button>
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="monthlySummary()">Monthly Summary</button>
<button onclick="addHoliday()">Add Holiday</button>

<div id="table"></div>
<div id="summary"></div>
<div id="holidayList"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyARZZMs4J24iFjLgmLzqqIz2PnwWmosmGg",
  authDomain: "madrasa-attendance-47e69.firebaseapp.com",
  projectId: "madrasa-attendance-47e69",
  storageBucket: "madrasa-attendance-47e69.firebasestorage.app",
  messagingSenderId: "390959800510",
  appId: "1:390959800510:web:19a1133e41b55b0ed1beef",
  measurementId: "G-EK7LF2NLVE"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOCATION (your madrasa)
const SCHOOL_LAT = 18.5204;
const SCHOOL_LNG = 73.8567;
const ALLOWED_RADIUS = 50;

// PINS
const pins = {
  "Shk Huzaifa bhai": "1111",
  "Shk Khuzaima bhai": "2222",
  "Shk Taha bhai": "3333",
  "Mulla Mohammad bhai": "4444",
  "Farida ben": "5555",
  "Arwa ben": "6666",
  "Rashida ben": "7777",
  "UmmeSalama ben": "8888"
};

const ADMIN_PIN = "1234";

// DISTANCE FUNCTION
function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)*Math.sin(Δλ/2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

// CHECK IN
window.checkIn = () => {
  const name = document.getElementById("teacher").value;
  const pin = document.getElementById("pin").value;

  if (pins[name] !== pin) return alert("Wrong PIN");

  navigator.geolocation.getCurrentPosition(async pos => {
    const dist = getDistance(pos.coords.latitude, pos.coords.longitude, SCHOOL_LAT, SCHOOL_LNG);

    if (dist > ALLOWED_RADIUS) {
      document.getElementById("status").innerText = "❌ Outside (" + Math.round(dist) + "m)";
      return;
    }

    const today = new Date().toDateString();

    // prevent multiple check-ins
    const q = query(collection(db, "attendance"),
      where("name", "==", name),
      where("date", "==", today)
    );

    const snap = await getDocs(q);

    if (!snap.empty) {
      alert("Already checked in today");
      return;
    }

    const now = new Date();
    const time = now.toLocaleTimeString();

    let status = "On Time";
    const lateTime = new Date();
    lateTime.setHours(16,50,0);

    if (now > lateTime) status = "Late";

    await addDoc(collection(db, "attendance"), {
      name, date: today, checkIn: time,
      checkOut: "", status,
      distance: Math.round(dist),
      timestamp: new Date()
    });

    document.getElementById("status").innerText = "✅ Checked In at " + time;

  });
};

// CHECK OUT
window.checkOut = async () => {
  const name = document.getElementById("teacher").value;

  const today = new Date().toDateString();

  const q = query(collection(db, "attendance"),
    where("name","==",name),
    where("date","==",today)
  );

  const snap = await getDocs(q);

  snap.forEach(async d => {
    const now = new Date().toLocaleTimeString();
    await updateDoc(doc(db, "attendance", d.id), {
      checkOut: now
    });
  });

  alert("Checked Out");
};

// LOAD TABLE
window.loadAttendance = async () => {
  if (document.getElementById("adminPin").value !== ADMIN_PIN) {
    alert("Wrong admin PIN");
    return;
  }

  const q = query(collection(db,"attendance"), orderBy("timestamp","desc"));
  const snap = await getDocs(q);

  let html = "<table><tr><th>Name</th><th>Date</th><th>In</th><th>Out</th><th>Status</th><th>Dist</th></tr>";

  snap.forEach(doc => {
    const d = doc.data();
    html += `<tr>
      <td>${d.name}</td>
      <td>${d.date}</td>
      <td>${d.checkIn}</td>
      <td>${d.checkOut}</td>
      <td>${d.status}</td>
      <td>${d.distance}m</td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;
};

// CSV
window.downloadCSV = async () => {
  if (document.getElementById("adminPin").value !== ADMIN_PIN) {
    alert("Wrong admin PIN");
    return;
  }

  const snap = await getDocs(collection(db,"attendance"));

  let csv = "Name,Date,CheckIn,CheckOut,Status,Distance\n";

  snap.forEach(doc => {
    const d = doc.data();
    csv += `${d.name},${d.date},${d.checkIn},${d.checkOut},${d.status},${d.distance}\n`;
  });

  const blob = new Blob([csv], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "attendance.csv";
  a.click();
};

// MONTHLY SUMMARY
window.monthlySummary = async () => {
  const snap = await getDocs(collection(db,"attendance"));

  let summary = {};

  snap.forEach(doc => {
    const d = doc.data();

    if (!summary[d.name]) {
      summary[d.name] = {total:0, late:0};
    }

    summary[d.name].total++;
    if (d.status === "Late") summary[d.name].late++;
  });

  let html = "<h3>Monthly Summary</h3><table><tr><th>Name</th><th>Total</th><th>Late</th></tr>";

  for (let name in summary) {
    html += `<tr><td>${name}</td><td>${summary[name].total}</td><td>${summary[name].late}</td></tr>`;
  }

  html += "</table>";

  document.getElementById("summary").innerHTML = html;
};

// HOLIDAYS
window.addHoliday = async () => {
  const date = prompt("Enter date (YYYY-MM-DD)");
  const name = prompt("Holiday name");

  await addDoc(collection(db,"holidays"), {date,name});

  alert("Holiday added");
};

</script>

</body>
</html>
